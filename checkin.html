<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SPC Check-In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --panel: #1c2b3a; --panel2: #243447; --accent: #c8372d;
  --blue: #2a6faa; --green: #2a7a45; --gold: #c9861a;
  --border: #ddd; --bg: #f0f0ee; --muted: #888; --text: #1a1a1a;
}
body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 60px; }

/* HEADER */
header { background: var(--panel); color: white; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
header h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; }
.header-sub { font-size: 11px; opacity: 0.55; margin-top: 2px; }
.status-pill { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1px; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; }
.pill-open { background: var(--green); color: white; }
.pill-closed { background: #555; color: #aaa; }

/* TABS */
.tab-bar { display: flex; background: var(--panel2); border-bottom: 3px solid var(--accent); }
.tab { flex: 1; padding: 11px 6px; text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.4); cursor: pointer; border: none; background: transparent; border-bottom: 3px solid transparent; margin-bottom: -3px; transition: color 0.15s; }
.tab.active { color: white; border-bottom-color: var(--accent); }

/* PAGES */
.page { display: none; padding: 14px; }
.page.active { display: block; }

/* CARDS */
.card { background: white; border-radius: 8px; padding: 14px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.07); }
.card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 12px; }

/* FIELDS */
.field-label { display: block; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 5px; margin-top: 12px; }
.field-label:first-child { margin-top: 0; }
input[type=text], select { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 6px; font-family: 'Barlow', sans-serif; font-size: 15px; background: #f9f9f7; color: var(--text); -webkit-appearance: none; transition: border-color 0.15s; }
input[type=text]:focus, select:focus { border-color: var(--blue); outline: none; background: white; }
input[type=text]::placeholder { color: #bbb; }

/* SEARCH WRAP */
.search-wrap { position: relative; }
.search-dropdown { display: none; position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1.5px solid var(--blue); border-top: none; border-radius: 0 0 8px 8px; z-index: 50; max-height: 220px; overflow-y: auto; box-shadow: 0 6px 16px rgba(0,0,0,0.12); }
.search-dropdown.open { display: block; }
.search-item { padding: 11px 14px; border-bottom: 1px solid #f0f0ee; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
.search-item:last-child { border-bottom: none; }
.search-item:active { background: #f0f6ff; }
.si-name { font-weight: 600; font-size: 15px; }
.si-meta { font-size: 12px; color: var(--muted); margin-top: 1px; }
.si-arrow { color: var(--blue); font-weight: 700; font-size: 14px; }
.search-new { padding: 11px 14px; cursor: pointer; color: var(--accent); font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 6px; border-top: 1px solid #f0f0ee; }
.search-new:active { background: #fff5f5; }

/* OPTION BUTTONS */
.opt-row { display: grid; gap: 8px; }
.opt-row.c2 { grid-template-columns: 1fr 1fr; }
.opt-row.c3 { grid-template-columns: 1fr 1fr 1fr; }
.opt-btn { padding: 10px 6px; border: 2px solid var(--border); border-radius: 6px; background: white; cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; text-align: center; color: #666; transition: all 0.1s; -webkit-user-select: none; user-select: none; line-height: 1.3; }
.opt-btn.sel-blue { border-color: var(--blue); background: var(--blue); color: white; }
.opt-btn.sel-green { border-color: var(--green); background: var(--green); color: white; }
.opt-btn.sel-gold { border-color: var(--gold); background: var(--gold); color: white; }

/* CHECKBOX ROW */
.check-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #f9f9f7; border-radius: 6px; border: 1.5px solid var(--border); cursor: pointer; margin-bottom: 0; }
.check-row input[type=checkbox] { width: 20px; height: 20px; accent-color: var(--gold); cursor: pointer; flex-shrink: 0; }
.check-row-label { font-size: 14px; font-weight: 500; color: var(--text); cursor: pointer; line-height: 1.3; }

/* SIGNATURE */
#sig-canvas { width: 100%; height: 110px; border: 2px dashed var(--border); border-radius: 6px; background: #f9f9f7; display: block; touch-action: none; cursor: crosshair; }
#sig-canvas.has-sig { border-style: solid; border-color: var(--green); background: #f6fdf9; }
.sig-row { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
.sig-status { font-size: 12px; color: var(--muted); }
.sig-status.signed { color: var(--green); font-weight: 600; }
.btn-sm { padding: 5px 12px; border-radius: 5px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

/* MAIN BUTTON */
.btn-main { width: 100%; padding: 15px; border: none; border-radius: 8px; background: var(--accent); color: white; font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; margin-top: 4px; transition: opacity 0.15s, transform 0.1s; }
.btn-main:active { transform: scale(0.98); opacity: 0.85; }
.btn-main:disabled { background: #ccc; cursor: not-allowed; transform: none; }
.btn-secondary { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 8px; background: transparent; color: var(--muted); font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; cursor: pointer; margin-top: 8px; }

/* DISPLAY NAME PREVIEW */
.name-preview { background: #f0f6ff; border: 1.5px solid var(--blue); border-radius: 6px; padding: 10px 12px; margin-top: 10px; font-size: 13px; color: var(--blue); display: none; }
.name-preview strong { font-weight: 700; }
.name-preview-choose { margin-top: 6px; color: var(--accent); font-size: 12px; font-weight: 600; cursor: pointer; text-decoration: underline; }
.nickname-input-wrap { display: none; margin-top: 8px; }
.nickname-counter { font-size: 11px; color: var(--muted); text-align: right; margin-top: 3px; }

/* SUMMARY BAR */
.summary-bar { background: var(--panel); color: white; border-radius: 8px; padding: 14px 16px; display: flex; justify-content: space-around; align-items: center; margin-bottom: 12px; }
.sum-item { text-align: center; }
.sum-val { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 700; }
.sum-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; opacity: 0.55; text-transform: uppercase; letter-spacing: 0.8px; margin-top: 1px; }

/* TONIGHT LIST */
.ci-item { display: flex; align-items: flex-start; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid #f0f0ee; gap: 8px; }
.ci-item:last-child { border-bottom: none; }
.ci-name { font-weight: 700; font-size: 15px; line-height: 1.2; }
.ci-detail { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
.ci-fee { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 16px; color: var(--green); white-space: nowrap; flex-shrink: 0; padding-top: 2px; }
.badges { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
.badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.3px; }
.badge-member { background: #e8f4ff; color: var(--blue); }
.badge-visitor { background: #eee; color: #555; }
.badge-ro { background: #fff3d6; color: var(--gold); }
.badge-signed { background: #e8faf0; color: var(--green); }
.badge-practice { background: #f0f0ee; color: #666; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }
.empty-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.4; }

/* PIN SCREEN */
.pin-screen { text-align: center; padding: 10px 0; }
.pin-title { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
.pin-subtitle { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
.pin-display { display: flex; gap: 14px; justify-content: center; margin: 18px 0 14px; }
.pin-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border); background: white; transition: all 0.15s; }
.pin-dot.filled { background: var(--blue); border-color: var(--blue); }
.pin-dot.error { background: var(--accent); border-color: var(--accent); animation: shake 0.3s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
.pin-error { font-size: 13px; color: var(--accent); font-weight: 600; min-height: 18px; margin-bottom: 10px; }
.pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 260px; margin: 0 auto 12px; }
.pin-key { padding: 16px 10px; border-radius: 8px; border: 1.5px solid var(--border); background: white; font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; text-align: center; cursor: pointer; transition: background 0.1s, transform 0.08s; -webkit-user-select: none; user-select: none; }
.pin-key:active { background: var(--blue); color: white; transform: scale(0.93); }
.pin-key.key-wide { grid-column: span 2; }
.pin-key.key-del { font-size: 16px; color: var(--muted); }
.pin-forgot { font-size: 13px; color: var(--blue); text-decoration: underline; cursor: pointer; margin-top: 4px; display: inline-block; }

/* CONFIRMATION */
.confirm-screen { text-align: center; padding: 30px 20px 10px; }
.confirm-icon { font-size: 64px; margin-bottom: 12px; animation: pop 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
@keyframes pop { 0%{transform:scale(0.2);opacity:0} 100%{transform:scale(1);opacity:1} }
.confirm-title { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--green); margin-bottom: 6px; }
.confirm-name { font-size: 19px; font-weight: 700; margin-bottom: 4px; }
.confirm-detail { font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
.btn-live { width: 100%; padding: 14px; border: none; border-radius: 8px; background: var(--blue); color: white; font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; cursor: pointer; margin-bottom: 8px; }
.btn-again { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 8px; background: transparent; color: var(--muted); font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; text-transform: uppercase; cursor: pointer; }

/* PIN SETUP */
.setup-card { background: #f0f6ff; border: 1.5px solid var(--blue); border-radius: 8px; padding: 14px; margin-top: 12px; }
.setup-card-title { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--blue); margin-bottom: 6px; }
.setup-card p { font-size: 13px; color: #444; margin-bottom: 10px; line-height: 1.4; }
.btn-setup-pin { padding: 10px 18px; border: none; border-radius: 6px; background: var(--blue); color: white; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; }
.btn-skip { padding: 10px 18px; border: 1.5px solid var(--border); border-radius: 6px; background: transparent; color: var(--muted); font-family: 'Barlow Condensed', sans-serif; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; margin-left: 8px; }

/* LOADING */
.loading { text-align: center; padding: 40px 20px; color: var(--muted); }
.spinner { width: 28px; height: 28px; border: 3px solid #ddd; border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* TOAST */
#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1c2b3a; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 999; transition: transform 0.3s; white-space: nowrap; pointer-events: none; }
#toast.show { transform: translateX(-50%) translateY(0); }
#toast.toast-error { background: var(--accent); }
#toast.toast-ok { background: var(--green); }

/* MISC */
.divider { height: 1px; background: var(--border); margin: 12px 0; }
.info-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
.info-row .info-lbl { color: var(--muted); }
.info-row .info-val { font-weight: 600; }
</style>
</head>
<body>

<header>
  <div>
    <h1>☀ SPC Check-In</h1>
    <div class="header-sub" id="header-date">Loading...</div>
  </div>
  <div class="status-pill pill-open" id="status-pill">● OPEN</div>
</header>

<div class="tab-bar">
  <button class="tab active" id="tab-btn-checkin" onclick="showTab('checkin')">✍ Check In</button>
  <button class="tab" id="tab-btn-tonight" onclick="showTab('tonight')">📋 Tonight (<span id="tonight-count">0</span>)</button>
</div>

<!-- CHECK IN TAB -->
<div id="tab-checkin" class="page active">
  <div id="view-form"><!-- form rendered here --></div>
  <div id="view-pin" style="display:none;"></div>
  <div id="view-confirm" style="display:none;"></div>
</div>

<!-- TONIGHT TAB -->
<div id="tab-tonight" class="page">
  <div class="summary-bar">
    <div class="sum-item"><div class="sum-val" id="sum-total">0</div><div class="sum-lbl">Checked In</div></div>
    <div class="sum-item"><div class="sum-val" id="sum-cash">$0</div><div class="sum-lbl">Cash</div></div>
    <div class="sum-item"><div class="sum-val" id="sum-bank">$0</div><div class="sum-lbl">Bank</div></div>
    <div class="sum-item"><div class="sum-val" id="sum-grand">$0</div><div class="sum-lbl">Total</div></div>
  </div>
  <div class="card" id="tonight-list">
    <div class="empty-state"><div class="empty-icon">📋</div>No check-ins yet tonight</div>
  </div>
</div>

<div id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
// --- FIREBASE ---
const firebaseConfig = {
  apiKey: "AIzaSyANlUmGg_IkBRTfzYXdOA7UjdBbED56tm8",
  authDomain: "pistol-club-scores.firebaseapp.com",
  databaseURL: "https://pistol-club-scores-default-rtdb.firebaseio.com",
  projectId: "pistol-club-scores"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- STATE ---
const KIOSK = new URLSearchParams(location.search).has('kiosk');
let members = {};        // id → member object
let roMembers = [];      // members with isRO true
let fees = { full: 5, range: 3 };
let todayKey = '';       // YYYYMMDD
let todayCheckins = {};  // pushKey → checkin record
let sessionRO = null;    // RO from today's live session if any
let formState = {
  memberId: null,        // null = new person
  isNew: false,
  firstName: '', lastName: '',
  displayName: '',
  type: 'member',       // member | visitor
  activity: 'event',    // event | practice
  feeType: 'full',      // full | range
  payment: 'cash',      // cash | bank
  isRO: false,
  roId: null,           // selected RO id if not themselves
  signed: false,
  nickname: '',
  chosenNickname: false
};
let pinEntry = '';
let pinMode = '';        // 'verify' | 'setup' | 'setup2'
let pinFirst = '';       // first entry when setting up PIN
let postCheckinMemberId = null;

// --- INIT ---
window.addEventListener('DOMContentLoaded', async () => {
  todayKey = formatDateKey(new Date());
  document.getElementById('header-date').textContent =
    (KIOSK ? 'Kiosk — ' : '') + formatDisplayDate(new Date());

  // Load config (fees)
  db.ref('config').once('value', snap => {
    const cfg = snap.val() || {};
    if (cfg.fees) {
      fees.full  = cfg.fees.full  ?? 5;
      fees.range = cfg.fees.range ?? 3;
    }
  });

  // Load members
  db.ref('members').once('value', snap => {
    members = snap.val() || {};
    computeDisplayNames();
    roMembers = Object.values(members).filter(m => m.isRO);
  });

  // Watch today's checkins
  db.ref('checkins/' + todayKey).on('value', snap => {
    todayCheckins = snap.val() || {};
    renderTonightTab();
  });

  // Check for live session RO today
  db.ref('currentSession').once('value', snap => {
    const cs = snap.val();
    if (cs && cs.meta) {
      const sessionDate = (cs.meta.date || '').replace(/-/g,'');
      if (sessionDate === todayKey && cs.meta.roName) {
        // find member by name match
        const roName = cs.meta.roName.toLowerCase();
        sessionRO = Object.values(members).find(m =>
          (m.firstName + ' ' + m.lastName).toLowerCase() === roName ||
          (m.displayName || '').toLowerCase() === roName
        ) || null;
      }
    }
  });

  renderForm();
});

// --- DATE HELPERS ---
function formatDateKey(d) {
  return d.getFullYear().toString() +
    String(d.getMonth()+1).padStart(2,'0') +
    String(d.getDate()).padStart(2,'0');
}
function formatDisplayDate(d) {
  return d.toLocaleDateString('en-AU', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}
function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString('en-AU', { hour:'numeric', minute:'2-digit', hour12:true });
}

// --- DISPLAY NAME COMPUTATION ---
function computeDisplayNames() {
  const all = Object.values(members);
  // Group by first name
  const byFirst = {};
  all.forEach(m => {
    const fn = (m.firstName || '').toLowerCase();
    if (!byFirst[fn]) byFirst[fn] = [];
    byFirst[fn].push(m);
  });

  all.forEach(m => {
    const fn = (m.firstName || '').toLowerCase();
    const group = byFirst[fn];
    if (group.length === 1) {
      // unique first name — just first name
      members[m.id] = { ...m, displayName: m.firstName };
    } else {
      // need to disambiguate by last name prefix
      const lastName = (m.lastName || '');
      const others = group.filter(o => o.id !== m.id);
      let len = 1;
      while (len <= lastName.length) {
        const prefix = lastName.substring(0, len).toLowerCase();
        const clash = others.some(o =>
          (o.lastName || '').toLowerCase().substring(0, len) === prefix
        );
        if (!clash) break;
        len++;
      }
      members[m.id] = { ...m, displayName: m.firstName + ' ' + lastName.substring(0, len) };
    }
  });
}

function getPublicName(m) {
  if (!m) return '';
  if (m.nickname) return m.nickname + ' (' + (m.displayName || m.firstName) + ')';
  return m.displayName || m.firstName;
}

// --- TABS ---
function showTab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('tab-btn-' + name).classList.add('active');
}

// --- TOAST ---
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' toast-' + type : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 2800);
}

// --- FORM RENDER ---
function resetFormState() {
  formState = {
    memberId: null, isNew: false,
    firstName: '', lastName: '',
    displayName: '', type: 'member',
    activity: 'event', feeType: 'full', payment: 'cash',
    isRO: false, roId: sessionRO ? sessionRO.id : null,
    signed: false, nickname: '', chosenNickname: false
  };
  pinEntry = '';
}

function renderForm() {
  resetFormState();
  document.getElementById('view-form').style.display = '';
  document.getElementById('view-pin').style.display = 'none';
  document.getElementById('view-confirm').style.display = 'none';

  const feeFullLabel = 'Full Fee — $' + fees.full;
  const feeRangeLabel = 'Range Pass — $' + fees.range;
  const roOptions = roMembers.map(m =>
    `<option value="${m.id}" ${formState.roId === m.id ? 'selected' : ''}>${getPublicName(m)}</option>`
  ).join('');
  const sessionRoDefault = sessionRO
    ? `<option value="${sessionRO.id}" selected>${getPublicName(sessionRO)}</option>`
    : '<option value="">— Select RO —</option>';

  document.getElementById('view-form').innerHTML = `
    <div class="card">
      <div class="card-title">Search or Enter Name</div>
      <div class="search-wrap">
        <input type="text" id="name-search" inputmode="text" autocomplete="off"
          placeholder="First name, last name..." oninput="onNameSearch(this.value)">
        <div class="search-dropdown" id="name-dropdown"></div>
      </div>
      <div class="name-preview" id="name-preview">
        You'll appear on score cards as <strong id="preview-display-name"></strong>
        <div class="name-preview-choose" onclick="toggleNicknameInput()">✏ Choose your own display name</div>
        <div class="nickname-input-wrap" id="nickname-wrap">

function onNameSearch(val) {
  const dd = document.getElementById('name-dropdown');
  const preview = document.getElementById('name-preview');
  preview.style.display = 'none';
  formState.memberId = null;
  formState.isNew = false;

  if (val.length < 2) { dd.classList.remove('open'); return; }

  const q = val.toLowerCase();
  const matches = Object.values(members).filter(m => {
    const full = (m.firstName + ' ' + m.lastName).toLowerCase();
    const dn = (m.displayName || '').toLowerCase();
    return full.includes(q) || dn.includes(q) ||
      m.firstName.toLowerCase().includes(q) ||
      m.lastName.toLowerCase().includes(q);
  }).slice(0, 8);

  let html = matches.map(m => {
    const tags = [m.isRO ? 'RO' : '', m.isVisitor ? 'Visitor' : 'Member'].filter(Boolean).join(' · ');
    return `<div class="search-item" onclick="selectMember('${m.id}')">
      <div>
        <div class="si-name">${getPublicName(m)}</div>
        <div class="si-meta">${tags}</div>
      </div>
      <span class="si-arrow">→</span>
    </div>`;
  }).join('');

  html += `<div class="search-new" onclick="selectNew()">＋ Not in list — add as new</div>`;
  dd.innerHTML = html;
  dd.classList.add('open');
}

function selectMember(id) {
  const m = members[id];
  if (!m) return;
  formState.memberId = id;
  formState.isNew = false;
  formState.firstName = m.firstName;
  formState.lastName = m.lastName;
  formState.displayName = m.displayName || m.firstName;
  formState.type = m.isVisitor ? 'visitor' : 'member';
  formState.nickname = m.nickname || '';

  // Fee preference
  if (m.feePreference === 'range') {
    formState.feeType = 'range';
    setFee('range');
  } else {
    formState.feeType = 'full';
    setFee('full');
  }

  // Type buttons
  setType(formState.type);

  document.getElementById('name-search').value =
    m.firstName + ' ' + m.lastName;
  document.getElementById('name-dropdown').classList.remove('open');

  // Show name preview
  const dn = m.nickname
    ? m.nickname + ' (' + formState.displayName + ')'
    : formState.displayName;
  document.getElementById('preview-display-name').textContent = dn;
  document.getElementById('name-preview').style.display = 'block';

  // If member has nickname already, hide "choose your own"
  if (m.nickname) {
    document.querySelector('.name-preview-choose').style.display = 'none';
  }

  // Check for pending (temp) record first, then PIN
  if (!KIOSK) {
    db.ref('currentCheckins/' + id).once('value').then(function(snap) {
      var ciRecord = snap.val();
      if (ciRecord && ciRecord.pending) {
        showPendingCompletion(id, ciRecord);
      } else if (m.checkinPin) {
        showPinVerify(id);
      }
    }).catch(function() {
      if (m.checkinPin) showPinVerify(id);
    });
  }
}

function selectNew() {
  formState.memberId = null;
  formState.isNew = true;
  const val = document.getElementById('name-search').value.trim();
  // Try to parse first/last
  const parts = val.split(' ');
  formState.firstName = parts[0] || '';
  formState.lastName = parts.slice(1).join(' ') || '';
  document.getElementById('name-dropdown').classList.remove('open');
  // Show name preview for new person
  document.getElementById('preview-display-name').textContent = computeNewDisplayName(formState.firstName, formState.lastName);
  document.getElementById('name-preview').style.display = 'block';
}

function computeNewDisplayName(first, last) {
  if (!first) return '';
  const fn = first.toLowerCase();
  const clashes = Object.values(members).filter(m => m.firstName.toLowerCase() === fn);
  if (clashes.length === 0) return first;
  // Need last name disambiguation
  if (!last) return first + ' ' + '?';
  let len = 1;
  while (len <= last.length) {
    const prefix = last.substring(0, len).toLowerCase();
    const clash = clashes.some(m => (m.lastName || '').toLowerCase().substring(0, len) === prefix);
    if (!clash) break;
    len++;
  }
  return first + ' ' + last.substring(0, len);
}

// --- SIGNATURE ---
function initSigCanvas() {
  const canvas = document.getElementById('sig-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let drawing = false;
  let lastX = 0, lastY = 0;

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const scaleX = canvas.width / r.width;
    const scaleY = canvas.height / r.height;
    if (e.touches) {
      return [(e.touches[0].clientX - r.left) * scaleX, (e.touches[0].clientY - r.top) * scaleY];
    }
    return [(e.clientX - r.left) * scaleX, (e.clientY - r.top) * scaleY];
  }

  function start(e) {
    e.preventDefault();
    drawing = true;
    [lastX, lastY] = getPos(e);
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
  }
  function move(e) {
    e.preventDefault();
    if (!drawing) return;
    const [x, y] = getPos(e);
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineTo(x, y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x, y);
    lastX = x; lastY = y;
    formState.signed = true;
    canvas.classList.add('has-sig');
    document.getElementById('sig-status').textContent = '✓ Signature captured';
    document.getElementById('sig-status').className = 'sig-status signed';
  }
  function end(e) { e.preventDefault(); drawing = false; }

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  canvas.addEventListener('mouseup', end);
  canvas.addEventListener('touchstart', start, { passive: false });
  canvas.addEventListener('touchmove', move, { passive: false });
  canvas.addEventListener('touchend', end, { passive: false });
}

function clearSig() {
  const canvas = document.getElementById('sig-canvas');
  if (!canvas) return;
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
  canvas.classList.remove('has-sig');
  formState.signed = false;
  document.getElementById('sig-status').textContent = 'Draw your signature above';
  document.getElementById('sig-status').className = 'sig-status';
}

async function submitCheckinFast() {
  const m = members[formState.memberId];

  try {
    const existing = await db.ref('currentCheckins/' + formState.memberId).once('value');
    if (existing.val()) {
      const d = new Date().toLocaleDateString('en-AU', {day:'numeric', month:'long', year:'numeric'});

      pinEntry = '';
      updatePinDots();
      return;

  const feeAmt = formState.feeType === 'range' ? fees.range : fees.full;
  const roName = getRoName();

  const record = {
    memberId: formState.memberId,
    firstName: m.firstName,
    lastName: m.lastName,
    displayName: getPublicName(m),
    type: m.isVisitor ? 'visitor' : 'member',
    activity: m.lastActivity || 'event',
    feeType: m.feePreference || 'full',
    feeAmount: feeAmt,
    payment: m.lastPayment || 'cash',
    isRO: false,
    roName: roName,
    signed: true,
    timestamp: Date.now()
  };

  try {
    await db.ref('checkins/' + todayKey).push(record);

    await db.ref('currentCheckins/' + formState.memberId).set(record);
    showConfirm(record, false);

    toast('Error saving — please try again', 'error');
    pinEntry = '';

  }
}

// --- SUBMIT CHECK-IN ---
async function submitCheckin() {
  if (!formState.signed) { toast('Please sign above', 'error'); return; }

  const nameVal = (document.getElementById('name-search').value || '').trim();
  if (!nameVal) { toast('Please enter your name', 'error'); return; }

  const btn = document.getElementById('btn-checkin');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    let memberId = formState.memberId;

    // Check for duplicate check-in (existing members only)
    if (memberId && !formState.isNew) {
      const existing = await db.ref('currentCheckins/' + memberId).once('value');
      if (existing.val()) {
        const d = new Date().toLocaleDateString('en-AU', {day:'numeric', month:'long', year:'numeric'});
        toast('Already checked in for ' + d, 'error');
        btn.disabled = false;
        btn.textContent = '✓ CHECK IN';
        return;
      }
    }

    // New member — create record
    if (formState.isNew || !memberId) {
      const parts = nameVal.split(' ');
      const fn = parts[0] || nameVal;
      const ln = parts.slice(1).join(' ') || '';
      const newRef = db.ref('members').push();
      memberId = newRef.key;
      const newMember = {
        id: memberId,
        firstName: fn,
        lastName: ln,
        isVisitor: formState.type === 'visitor',
        isRO: false,
        feePreference: formState.feeType,
        lastActivity: formState.activity,
        lastPayment: formState.payment
      };
      await newRef.set(newMember);
      members[memberId] = newMember;
      computeDisplayNames();
    } else {
      // Update fee preference if changed
      const m = members[memberId];
      const updates = {};
      if (m.feePreference !== formState.feeType) updates.feePreference = formState.feeType;
      updates.lastActivity = formState.activity;
      updates.lastPayment = formState.payment;
      // Save nickname if chosen
      if (formState.chosenNickname && formState.nickname) {
        updates.nickname = formState.nickname;
        members[memberId].nickname = formState.nickname;
      }
      await db.ref('members/' + memberId).update(updates);
      members[memberId] = { ...members[memberId], ...updates };
    }

    const m = members[memberId];
    const feeAmt = formState.feeType === 'range' ? fees.range : fees.full;
    const roName = getRoName();

    const record = {
      memberId,
      firstName: m.firstName,
      lastName: m.lastName,
      displayName: getPublicName(m),
      type: formState.type,
      activity: formState.activity,
      feeType: formState.feeType,
      feeAmount: feeAmt,
      payment: formState.payment,
      isRO: formState.isRO,
      roName,
      signed: true,
      timestamp: Date.now()
    };

    await db.ref('checkins/' + todayKey).push(record);
    // Write to currentCheckins for index.html Registration tab
    await db.ref('currentCheckins/' + memberId).set(record);

    showConfirm(record, !formState.memberId || formState.isNew ? false : !members[memberId]?.checkinPin);

    // Offer PIN setup to existing members who don't have one (personal QR mode only)
    if (!KIOSK && memberId && !members[memberId]?.checkinPin) {
      postCheckinMemberId = memberId;
      setTimeout(() => showPinSetup(memberId), 300);
    }

  } catch(e) {
    console.error(e);
    toast('Error — please try again', 'error');
    btn.disabled = false;
    btn.textContent = '✓ CHECK IN';
  }
}

function getRoName() {
  if (formState.isRO && formState.memberId) {
    return getPublicName(members[formState.memberId]);
  }
  if (formState.roId && members[formState.roId]) {
    return getPublicName(members[formState.roId]);
  }
  const sel = document.getElementById('ro-select');
  if (sel && sel.value && members[sel.value]) return getPublicName(members[sel.value]);
  return '';
}

// --- CONFIRMATION SCREEN ---
function showConfirm(record, offerPin) {
  document.getElementById('view-form').style.display = 'none';
  document.getElementById('view-pin').style.display = 'none';
  document.getElementById('view-confirm').style.display = 'block';

  const feeStr = '$' + record.feeAmount + ' · ' +
    (record.payment === 'cash' ? '💵 Cash' : '🏦 Bank Transfer');
  const actStr = record.activity === 'event' ? '🎯 Event' : '🏃 Practice';

  if (KIOSK) {
    // Kiosk: show confirm then auto-reset
    document.getElementById('view-confirm').innerHTML = `
      <div class="confirm-screen active">
        <div class="confirm-icon">✅</div>
        <div class="confirm-title">Checked In!</div>
        <div class="confirm-name">${record.displayName}</div>
        <div class="confirm-detail">${actStr} · ${feeStr}${record.roName ? '<br>RO: ' + record.roName : ''}</div>
      </div>
    `;
    setTimeout(() => {
      renderForm();
      showTab('checkin');
    }, 4000);
  } else {
    // Personal QR: show confirm with Live Scores button
    document.getElementById('view-confirm').innerHTML = `
      <div class="confirm-screen active" id="confirm-inner">
        <div class="confirm-icon">✅</div>
        <div class="confirm-title">Checked In!</div>
        <div class="confirm-name">${record.displayName}</div>
        <div class="confirm-detail">${actStr} · ${feeStr}${record.roName ? '<br>RO: ' + record.roName : ''}</div>
        <div class="confirm-actions">
          <button class="btn-live" onclick="goLive()">📊 View Live Scores</button>
          <button class="btn-again" onclick="renderForm()">Check in someone else</button>
        </div>
      </div>
    `;
  }
}

function goLive() {
  window.location.href = 'live.html';
}

// --- TONIGHT TAB ---
function renderTonightTab() {
  const list = Object.values(todayCheckins);
  document.getElementById('tonight-count').textContent = list.length;

  if (list.length === 0) {
    document.getElementById('tonight-list').innerHTML =
      '<div class="empty-state"><div class="empty-icon">📋</div>No check-ins yet tonight</div>';
    updateSummary([]);
    return;
  }

  // Sort by timestamp
  list.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));

  const html = list.map(ci => {
    const badgeMember = ci.type === 'visitor'
      ? '<span class="badge badge-visitor">Visitor</span>'
      : '<span class="badge badge-member">Member</span>';
    const badgeRO = ci.isRO ? '<span class="badge badge-ro">RO</span>' : '';
    const badgeSigned = ci.signed ? '<span class="badge badge-signed">✓ Signed</span>' : (ci.pending ? '<span class="badge" style="background:#fff3cd;color:#856404">⚠ Pending</span>' : '');
    const badgePractice = ci.activity === 'practice' ? '<span class="badge badge-practice">Practice</span>' : '';
    const feeLabel = ci.feeType === 'range' ? 'Range Pass' : 'Full Fee';
    const payLabel = ci.payment === 'bank' ? 'Bank' : 'Cash';
    const timeStr = ci.timestamp ? formatTime(ci.timestamp) : '';
    const roStr = ci.roName ? ' · RO: ' + ci.roName : '';
    return `
      <div class="ci-item">
        <div style="flex:1;min-width:0">
          <div class="ci-name">${ci.displayName || ci.firstName}</div>
          <div class="badges">${badgeMember}${badgeRO}${badgeSigned}${badgePractice}</div>
          <div class="ci-detail">${feeLabel} $${ci.feeAmount} · ${payLabel} · ${timeStr}${roStr}</div>
        </div>
        <div class="ci-fee">${ci.pending ? '&mdash;' : '$' + ci.feeAmount}</div>
      </div>`;
  }).join('');

  document.getElementById('tonight-list').innerHTML = html;
  updateSummary(list);
}

function updateSummary(list) {
  const cash = list.filter(c => c.payment === 'cash').reduce((s, c) => s + (c.feeAmount || 0), 0);
  const bank = list.filter(c => c.payment === 'bank').reduce((s, c) => s + (c.feeAmount || 0), 0);
  document.getElementById('sum-total').textContent = list.length;
  document.getElementById('sum-cash').textContent = '$' + cash;
  document.getElementById('sum-bank').textContent = '$' + bank;
  document.getElementById('sum-grand').textContent = '$' + (cash + bank);
}
</script>
