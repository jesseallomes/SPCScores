<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1c2b3a">
<title>SPC Results</title>
<style>

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Roboto', Arial, sans-serif; background: #f0f0ee; color: #1a1a1a; }
@import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&family=Roboto:wght@300;400;500&family=Roboto+Mono:wght@400;600&display=swap');

:root {
  --panel: #1c2b3a; --panel2: #243447; --bg: #f0f0ee; --card: #fff;
  --text: #1a1a1a; --muted: #666; --border: #ddd; --input-bg: #f9f9f7;
  --accent: #c8372d; --accent2: #2a6faa; --green: #2a7a45; --gold: #c9861a;
}

header {
  background: var(--panel); color: white; padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 200;
}
header h1 { font-family: 'Roboto Condensed',sans-serif; font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.night-label { font-size: 11px; opacity: 0.7; margin-top: 2px; }
.sync-badge { border-radius: 4px; padding: 3px 8px; font-size: 11px; font-family: monospace; }
.sync-badge.ok { background: rgba(42,122,69,0.3); color: #7ec87e; border: 1px solid rgba(42,122,69,0.4); }

.tab-bar {
  display: flex; background: var(--panel2);
  border-bottom: 3px solid var(--accent);
  position: sticky; top: 52px; z-index: 100;
}
.tab-btn {
  flex: 1; padding: 12px 8px; text-align: center;
  font-family: 'Roboto Condensed',sans-serif; font-weight: 700; font-size: 13px;
  text-transform: uppercase; letter-spacing: 1px;
  color: rgba(255,255,255,0.5); cursor: pointer;
  border: none; background: transparent;
  border-bottom: 3px solid transparent; margin-bottom: -3px;
  transition: all 0.15s;
}
.tab-btn.active { color: white; border-bottom-color: var(--accent); }

.comp-toggles {
  display: flex; gap: 8px; padding: 10px 12px;
  background: var(--bg); border-bottom: 1px solid var(--border); flex-wrap: wrap;
}
.tab-content { padding: 12px; display: none; }
.tab-content.active { display: block; }

/* Results */
.results-section-title { background: var(--panel); color: white; padding: 12px 16px;
  font-family: 'Roboto Condensed',sans-serif; font-weight: 700; font-size: 16px;
  letter-spacing: 1px; text-transform: uppercase; border-radius: 8px 8px 0 0; }
.results-table-wrap { background: white; border-radius: 0 0 8px 8px; overflow-x: auto;
  margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border: 1px solid #ddd; }
.rtable { width: 100%; border-collapse: collapse; font-size: 13px; }
.rtable th { background: #243447; color: white; padding: 8px 8px;
  font-family: 'Roboto Condensed',sans-serif; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; text-align: left; }
.rtable td { padding: 8px 8px; border-bottom: 1px solid #eee; font-size: 13px; color: #1a1a1a; }
.rtable tr:last-child td { border-bottom: none; }
.cat-row td { background: #e8eef4; font-family: 'Roboto Condensed',sans-serif;
  font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #1a1a1a; padding: 8px 14px; }
.section-divider-row td { background: var(--panel); color: white; padding: 8px 14px;
  font-family: 'Roboto Condensed',sans-serif; font-weight: 700; font-size: 12px; text-transform: uppercase; }
.pill { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px;
  font-family: 'Roboto Mono',monospace; font-weight: 600; }
.p22s,.p22m,.p22r { background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7; }
.p9mms,.p9mmm { background:#f3e5f5;color:#6a1b9a;border:1px solid #ce93d8; }
.p357s,.p357m,.p38s,.p38m { background:#fff3e0;color:#e65100;border:1px solid #ffcc02; }
.p44s,.p44m,.p45s,.p45m { background:#fce4ec;color:#880e4f;border:1px solid #f48fb1; }
.p32s,.p32m,.p25s,.p380s { background:#e8eaf6;color:#1a237e;border:1px solid #9fa8da; }
.pairs,.pairm { background:#f1f8e9;color:#33691e;border:1px solid #aed581; }
.pother { background:#eee;color:#555;border:1px solid #ccc; }
.empty-state { text-align:center;padding:40px;color:#888;font-size:14px; }

/* Score cards */
.score-card { background:white;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.1);
  margin-bottom:10px;overflow:hidden;border-left:4px solid #2a6faa; }
.score-card-head { background:#1c2b3a;color:white;padding:9px 12px;display:flex;align-items:center;justify-content:space-between; }
.score-card-name { font-family:'Roboto Condensed',sans-serif;font-weight:700;font-size:16px; }
.pistol-entry { background:#f9f9f7;border:1.5px solid #ddd;border-radius:6px;padding:8px 10px;margin-bottom:8px; }
.paper-zones { display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px; }
.zone-col { display:flex;flex-direction:column;align-items:center;gap:2px; }
.zone-lbl { font-size:11px;font-family:'Roboto Mono',monospace;font-weight:700;color:#888; }
.zone-lbl.x { color:#c8372d; }
.zone-val { width:44px;height:36px;text-align:center;border:1.5px solid #ddd;border-radius:5px;
  background:#f9f9f7;font-family:'Roboto Mono',monospace;font-weight:700;font-size:14px;
  color:#1a1a1a;display:flex;align-items:center;justify-content:center; }
.time-row { display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:4px; }
.run-col { display:flex;flex-direction:column;align-items:center;gap:2px; }
.run-val { width:72px;height:36px;text-align:center;border:1.5px solid #ddd;border-radius:5px;
  background:#f9f9f7;font-family:'Roboto Mono',monospace;font-weight:700;font-size:14px;
  color:#1a1a1a;position:relative;display:flex;align-items:center;justify-content:center; }
.pen-badge { position:absolute;top:2px;right:2px;background:#e55;color:white;
  border-radius:8px;padding:0 3px;font-size:8px;font-family:'Roboto Condensed',sans-serif;font-weight:700;line-height:14px; }
.score-result { font-family:'Roboto Mono',monospace;font-size:13px;font-weight:700;color:#2a6faa;margin-top:4px; }
.export-bar { display:flex;gap:10px;justify-content:center;padding:20px;flex-wrap:wrap; }
.btn { padding:10px 20px;border-radius:6px;border:none;cursor:pointer;font-family:'Roboto Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:0.5px;text-transform:uppercase; }
.btn-dark { background:#1c2b3a;color:white; }
.btn-green { background:#2a7a45;color:white; }
.no-comp { display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:50vh;font-family:'Roboto Condensed',sans-serif;text-align:center;padding:40px 20px;color:#888; }
.no-comp .icon { font-size:56px;margin-bottom:16px; }
.no-comp h2 { font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;color:#333; }
.live-badge { display:inline-flex;align-items:center;gap:5px;background:#c8372d;color:white;
  border-radius:12px;padding:3px 10px;font-size:11px;font-family:'Roboto Mono',monospace;font-weight:700; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.6} }
.pulsing { animation:pulse 2s infinite; }

body { padding-bottom: 60px; }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:10px">
    <img src="logo.png" style="width:40px;height:40px;border-radius:50%;object-fit:cover" onerror="this.style.display='none'" alt="SPC">
    <div>
      <h1>Sunraysia Pistol Club</h1>
      <div class="night-label" id="hdr-sub">Loading...</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div id="status-badge" class="live-badge pulsing">● LIVE</div>
    <div class="sync-badge ok" id="sync-badge">⟳</div>
  </div>
</header>

<div class="comp-toggles" id="comp-toggles" style="display:none"></div>

<div class="tab-bar">
  <button class="tab-btn active" id="btn-rankings" onclick="showTab('rankings')">🏆 Rankings</button>
  <button class="tab-btn" id="btn-scores" onclick="showTab('scores')">📋 Scores</button>
</div>

<div id="tab-rankings" class="tab-content active"></div>
<div id="tab-scores" class="tab-content"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const ORDINALS = ['', '', '2nd', '3rd', '4th', '5th'];

function formatDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function formatDateDMY(isoDate) {
  if (!isoDate) return '';
  const [y,m,d] = isoDate.split('-');
  return `${d}/${m}/${y}`;
}

function calibreOrder(cal) {
  const c = cal.toLowerCase().replace(/\s/g,'');
  // known map
  const map = {
    'air':0.0,'airpistol':0.0,
    '.177':0.177,
    '.22':0.220,'22':0.220,'.22wmr':0.221,'22wmr':0.221,
    '.25':0.250,'6.35mm':0.250,
    '.32':0.320,'7.65mm':0.320,
    '9mm':0.354,'9':0.354,
    '.356':0.356,'.357':0.357,
    '.38':0.380,'.380':0.380,'9mmshort':0.380,
    '.40':0.400,'10mm':0.400,
    '.41':0.410,'.44':0.440,'.45':0.450,'.50':0.500
  };
  if (map[c] !== undefined) return map[c];
  // try to parse numeric e.g. ".44 mag" -> 0.44
  const m = c.match(/(\d+\.?\d*)/);
  if (m) {
    let n = parseFloat(m[1]);
    if (n > 10) n = n / 1000; // e.g. 357 -> 0.357
    return n;
  }
  return 999;
}

function getCatInfo(calibre, cls, type, suffix) {
  // Revolvers: append R to calibre display e.g. ".22R S"
  const calDisplay = type === 'R' ? `${calibre}R` : calibre;
  const suffixStr = suffix ? ` (${suffix})` : '';
  return { label: `${calDisplay} ${cls}${suffixStr}`, cls: pillCls(calibre) };
}

function pillCls(calibre) {
  const known = {'.22':'p22s','.22r':'p357s','9mm':'p9mms','.38':'p22m',
                 '.357':'p357m','.40':'p9mmm','.45':'pother','air':'p22m'};
  const k = calibre.toLowerCase().replace(/\s/g,'');
  if (known[k]) return known[k];
  if (!_pillCache[k]) {
    const keys = Object.keys(_pillCache);
    _pillCache[k] = PILL_PALETTE[keys.length % PILL_PALETTE.length];
  }
  return _pillCache[k];
}

function runCount() {
  const m = S.steel.method;
  if (m === 'best2' || m === 'avg2') return 2;
  if (m === 'best3' || m === 'avg3') return 3;
  return 1;
}

function methodLabel(m) {
  const map = {
    single: 'Single run', first: 'First time', best2: 'Best of 2',
    best3: 'Best of 3', avg2: 'Average of 2', avg3: 'Average of 3'
  };
  return map[m] || m;
}

function calcSteel(sid, pi) {
  const sc = S.scores[sid]?.[pi]?.steel || {};
  const runs = runCount();
  const stages = S.steel.stages;
  const method = S.steel.method;
  let total = 0;
  for (let stg = 0; stg < stages; stg++) {
    const times = [];
    for (let r = 0; r < runs; r++) {
      const v = parseFloat(sc[`s${stg}_r${r}`]);
      if (!isNaN(v) && v > 0) times.push(v);
    }
    if (!times.length) return null;
    if (method === 'single' || method === 'first') total += times[0];
    else if (method === 'best2' || method === 'best3') total += Math.min(...times);
    else if (method === 'avg2' || method === 'avg3') total += times.reduce((a,b)=>a+b,0)/times.length;
  }
  // Per-run penalties: each run's time already adjusted, so recalc with them
  // We need to find the winning run(s) and add their penalties
  // Recalculate including per-run penalties
  const penaltyTime = S.steel.penalty || 5;
  let totalWithPen = 0;
  for (let stg = 0; stg < stages; stg++) {
    const runData = Array.from({length:runs}, (_, r) => {
      const t = parseFloat(sc[`s${stg}_r${r}`]);
      const miss = parseInt(sc[`s${stg}_r${r}_miss`]) || 0;
      const oos  = parseInt(sc[`s${stg}_r${r}_oos`])  || 0;
      const adj = (!isNaN(t) && t > 0) ? t + (miss + oos) * penaltyTime : null;
      return adj;
    }).filter(v => v !== null);
    if (!runData.length) return null;
    if (method === 'single' || method === 'first') totalWithPen += runData[0];
    else if (method === 'best2' || method === 'best3') totalWithPen += Math.min(...runData);
    else if (method === 'avg2' || method === 'avg3') totalWithPen += runData.reduce((a,b)=>a+b,0)/runData.length;
  }
  return totalWithPen;
}

function calcPaper(sid, pi) {
  const sc = S.scores[sid]?.[pi]?.paper || {};
  const zones = ['X','10','9','8','7','6'];
  let any = false;
  const vals = {};
  zones.forEach(z => { vals[z] = parseInt(sc[`z${z}`]) || 0; if (vals[z]) any = true; });
  if (!any) return null;

  // X = 0.01 pts each ONLY (not 10 + 0.01)
  const total =
    vals['X']  * 0.01 +
    vals['10'] * 10 +
    vals['9']  * 9 +
    vals['8']  * 8 +
    vals['7']  * 7 +
    vals['6']  * 6;

  const parts = [];
  if (vals['X']) parts.push(`${vals['X']}xX`);
  ['10','9','8','7','6'].forEach(z => { if (vals[z]) parts.push(`${vals[z]}x${z}`); });

  return { total, display: parts.join(' ') || '-', xCount: vals['X'], vals };
}

function getRunData(sid, pi) {
  const sc = S.scores[sid]?.[pi]?.steel || {};
  const runs = runCount();
  const stages = S.steel.stages;
  const penaltyTime = S.steel.penalty || 5;
  const result = [];
  for (let stg = 0; stg < stages; stg++) {
    for (let r = 0; r < runs; r++) {
      const raw = parseFloat(sc[`s${stg}_r${r}`]);
      const miss = parseInt(sc[`s${stg}_r${r}_miss`]) || 0;
      const oos  = parseInt(sc[`s${stg}_r${r}_oos`])  || 0;
      const penSec = (miss + oos) * penaltyTime;
      const adj = (!isNaN(raw) && raw > 0) ? raw + penSec : null;
      result.push({ stg, r, raw: (!isNaN(raw) && raw > 0) ? raw : null, miss, oos, penSec, adj });
    }
  }
  return result;
}

function getAllEntries(type) {
  const entries = [];

  // Step 1: for each shooter, work out which ordinal each pistol entry is
  // within that shooter's own calibre+class combo (per-shooter count)
  const shooterPistolOrdinals = {}; // shooterId -> [ordinal per pistol index]
  S.shooters.forEach(s => {
    const perShooterCount = {};
    shooterPistolOrdinals[s.id] = (s.pistols || []).map((p) => {
      const typeStr = p.type === 'R' ? 'R' : '';
      const baseCat = `${p.calibre}_${typeStr}_${p.cls}`;
      perShooterCount[baseCat] = (perShooterCount[baseCat] || 0) + 1;
      return perShooterCount[baseCat]; // 1 = first, 2 = second, etc
    });
  });

  // Step 2: build entries with the correct catKey using that shooter's ordinal
  S.shooters.forEach(s => {
    (s.pistols || []).forEach((p, pi) => {
      const score = type === 'steel' ? calcSteel(s.id, pi) : calcPaper(s.id, pi);
      if (score !== null) {
        const typeStr = p.type === 'R' ? 'R' : '';
        const baseCat = `${p.calibre}_${typeStr}_${p.cls}`;
        const ordinal = (shooterPistolOrdinals[s.id] || [])[pi] || 1;
        const suffix = ordinal > 1 ? (ORDINALS[ordinal] || `${ordinal}th`) : '';
        // catKey groups ALL shooters' nth entries of this calibre/class together
        const catKey = suffix ? `${baseCat}_${suffix}` : baseCat;
        entries.push({ shooter: s, pistol: p, pi, score, catKey, ordinal,
          catInfo: getCatInfo(p.calibre, p.cls, p.type, suffix) });
      }
    });
  });

  if (type === 'steel') entries.sort((a,b) => a.score - b.score);
  else entries.sort((a,b) => b.score.total - a.score.total);
  return entries;
}

function sortedByCategory(entries) {
  return [...entries].sort((a, b) => {
    // Ordinal group first — 1st before 2nd before 3rd etc
    if (a.ordinal !== b.ordinal) return a.ordinal - b.ordinal;
    // Within same ordinal: calibre order
    const co = calibreOrder(a.pistol.calibre) - calibreOrder(b.pistol.calibre);
    if (co !== 0) return co;
    // Pistol before Revolver
    const aR = a.pistol.type === 'R' ? 1 : 0;
    const bR = b.pistol.type === 'R' ? 1 : 0;
    if (aR !== bR) return aR - bR;
    // S before M
    if (a.pistol.cls === 'S' && b.pistol.cls === 'M') return -1;
    if (a.pistol.cls === 'M' && b.pistol.cls === 'S') return 1;
    return 0;
  });
}

function resultRow(e, i, isSteel, runs) {
  const rank = i + 1;
  const medalStyle = rank === 1
    ? 'background:#FFD700;color:#5a3d00;width:30px;height:30px;font-size:14px;border:2px solid #c8a400;'
    : rank === 2
    ? 'background:#C0C0C0;color:#333;width:26px;height:26px;font-size:12px;border:2px solid #999;'
    : rank === 3
    ? 'background:#CD7F32;color:#fff;width:23px;height:23px;font-size:11px;border:2px solid #a05c20;'
    : 'background:#e0e0e0;color:#666;width:21px;height:21px;font-size:10px;border:1px solid #ccc;';
  const badge = `<span style="${medalStyle}border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-family:'Roboto Condensed',sans-serif;font-weight:700">${rank}</span>`;

  const calStr = e.pistol.type === 'R' ? `${e.pistol.calibre}R` : e.pistol.calibre;
  const catPill = `<span class="pill ${e.catInfo.cls}" style="font-size:10px;padding:1px 5px">${e.catInfo.label}</span>`;

  let scoreCols;
  if (isSteel) {
    const runData = getRunData(e.shooter.id, e.pi);
    const method = S.steel.method;
    const methodLabel = {'single':'','first':'','best2':'Best','best3':'Best','avg2':'Avg','avg3':'Avg'}[method]||'';
    const runCols = Array.from({length: runs}, (_,r) => {
      const rd = runData.find(d => d.r === r && d.stg === 0);
      if (!rd || rd.adj === null) return `<td style="text-align:center;color:var(--muted);font-size:12px">—</td>`;
      const penHtml = rd.penSec > 0
        ? `<span style="position:absolute;top:2px;right:2px;background:#e55;color:white;border-radius:8px;padding:0px 3px;font-size:8px;font-family:'Roboto Condensed',sans-serif;font-weight:700;line-height:14px">+${rd.penSec.toFixed(0)}s</span>`
        : '';
      return `<td style="position:relative;text-align:center;font-family:'Roboto Mono',monospace;font-size:12px;white-space:nowrap;padding:8px 6px">${rd.adj.toFixed(2)}${penHtml}</td>`;
    }).join('');
    const finalLabel = methodLabel ? `<div style="font-size:9px;color:var(--muted)">${methodLabel}</div>` : '';
    scoreCols = runCols + `<td style="font-weight:700;font-family:'Roboto Mono',monospace;font-size:13px;text-align:center;white-space:nowrap">${finalLabel}${e.score.toFixed(2)}s</td>`;
  } else {
    scoreCols = `<td style="font-weight:700;font-family:'Roboto Mono',monospace;text-align:center"><span style="font-size:14px">${e.score.total.toFixed(2)}</span><div style="font-size:10px;color:var(--muted)">${e.score.display}</div></td>`;
  }

  return `<tr>
    <td style="text-align:center;padding:8px 6px">${badge}</td>
    <td style="font-size:13px;padding:8px 6px"><strong>${e.shooter.firstName} ${e.shooter.lastName}</strong></td>
    <td style="font-size:12px;color:var(--muted);padding:8px 6px">${e.pistol.make||'—'}</td>
    <td style="padding:8px 6px">${catPill}</td>
    ${scoreCols}
  </tr>`;
}

function buildResultSection(type, entries) {
  const isSteel = type === 'steel';
  const name = isSteel ? S.steel.name : S.paper.name;
  const icon = isSteel ? '[T]' : '[P]';
  const runs = isSteel ? runCount() : 0;
  const method = S.steel.method;
  const methodLabel = {'single':'Time','first':'Time','best2':'Best of 2','best3':'Best of 3','avg2':'Avg of 2','avg3':'Avg of 3'}[method]||'Best';

  if (!entries.length) return `
    <div class="results-section-title">${icon} ${name.toUpperCase()}</div>
    <div class="results-table-wrap"><div class="empty-state">No scores entered</div></div>`;

  // Build column headers
  const runHeaders = isSteel
    ? Array.from({length: runs}, (_,r) => `<th style="text-align:center">RUN ${r+1}</th>`).join('') + `<th style="text-align:center">${methodLabel.toUpperCase()}</th>`
    : `<th style="text-align:center">SCORE</th>`;
  const tableHeader = `<thead><tr><th>#</th><th>NAME</th><th>PISTOL</th><th>CAT</th>${runHeaders}</tr></thead>`;

  // Overall top entries (all, sorted by score)
  const overallRows = entries.map((e, i) => resultRow(e, i, isSteel, runs)).join('');

  // By category
  const catSorted = sortedByCategory(entries);
  const groups = new Map();
  catSorted.forEach(e => {
    if (!groups.has(e.catKey)) groups.set(e.catKey, []);
    groups.get(e.catKey).push(e);
  });

  let catRows = '';
  let lastOrdinal = null;
  groups.forEach((items, key) => {
    const ordinal = items[0].ordinal || 1;
    if (ordinal !== lastOrdinal) {
      lastOrdinal = ordinal;
      const ordLabel = ordinal === 1 ? '1st Run — Scoring Shoot'
        : `${['','','2nd','3rd','4th','5th'][ordinal]||ordinal+'th'} Run — Non Scoring`;
      const ordCols = isSteel ? runs + 5 : 5;
      catRows += `<tr><td colspan="${ordCols}" style="background:var(--panel);color:white;padding:8px 14px;font-family:'Roboto Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;text-transform:uppercase">${ordLabel}</td></tr>`;
    }
    const sortedItems = [...items].sort((a,b) => isSteel ? a.score - b.score : b.score.total - a.score.total);
    const totalCols = isSteel ? runs + 5 : 5;
    catRows += `<tr class="cat-row"><td colspan="${totalCols}">${items[0].catInfo.label}</td></tr>`;
    sortedItems.forEach((e, i) => { catRows += resultRow(e, i, isSteel, runs); });
  });

  return `
    <div class="results-section-title">${icon} ${name.toUpperCase()} - OVERALL</div>
    <div class="results-table-wrap" style="margin-bottom:8px">
      <table class="rtable">${tableHeader}<tbody>${overallRows}</tbody></table>
    </div>
    <div class="results-section-title" style="background:#2a6faa">${icon} ${name.toUpperCase()} - BY CATEGORY</div>
    <div class="results-table-wrap" style="margin-bottom:28px">
      <table class="rtable">${tableHeader}<tbody>${catRows}</tbody></table>
    </div>`;
}

function buildScoreSheet(wb, type) {
  const isSteel = type === 'steel';
  const compName = isSteel ? (S.steel.name || 'Steel') : (S.paper.name || 'Paper');
  const method = S.steel.method;
  const methodStr = {'single':'Single run','first':'First time','best2':'Best of 2','best3':'Best of 3','avg2':'Average of 2','avg3':'Average of 3'}[method]||'';
  const methodLabel = {'single':'Time','first':'Time','best2':'Best of 2','best3':'Best of 3','avg2':'Avg of 2','avg3':'Avg of 3'}[method]||'Time';
  const sheetTitle = isSteel
    ? `${compName} - ${methodStr} - ${formatDateDMY(S.date) || S.date}`
    : `${compName} - ${formatDateDMY(S.date) || S.date}`;
  const sheetName = (isSteel ? 'Steel' : 'Paper').slice(0,31);
  const runs = isSteel ? runCount() : 0;
  const penaltyTime = S.steel.penalty || 5;

  const allE = getAllEntries(type);
  const catSorted = sortedByCategory(allE);
  const groups = new Map();
  catSorted.forEach(e => {
    if (!groups.has(e.catKey)) groups.set(e.catKey, []);
    groups.get(e.catKey).push(e);
  });

  // Build column headers
  let dataHeaders, numCols;
  if (isSteel) {
    const runCols = Array.from({length: runs}, (_,r) => `Run ${r+1} (s)`);
    dataHeaders = ['Name', 'Pistol', 'Calibre', 'M/S', ...runCols, methodLabel];
    numCols = dataHeaders.length;
  } else {
    dataHeaders = ['Name', 'Pistol', 'Calibre', 'M/S', 'X', '10', '9', '8', '7', '6', 'Score'];
    numCols = 11;
  }

  const rows = [];
  const boldRows = new Set();   // row indices to bold
  const mergeRows = new Set();  // row indices to merge

  // Title row
  rows.push([sheetTitle, ...Array(numCols-1).fill('')]);
  boldRows.add(0); mergeRows.add(0);

  let lastOrdinal = null;

  groups.forEach((items, key) => {
    const ordinal = items[0].ordinal || 1;
    const sortedItems = [...items].sort((a,b) => isSteel ? a.score - b.score : b.score.total - a.score.total);

    if (ordinal !== lastOrdinal) {
      lastOrdinal = ordinal;
      rows.push(Array(numCols).fill(''));  // blank
      const ordLabel = ordinal === 1 ? '1st Run - Scoring Shoot'
        : `${['','','2nd','3rd','4th','5th'][ordinal]||ordinal+'th'} Run - Non Scoring`;
      rows.push([ordLabel, ...Array(numCols-1).fill('')]);
      boldRows.add(rows.length-1); mergeRows.add(rows.length-1);
    }

    rows.push(Array(numCols).fill(''));  // blank before category
    // Category heading row
    rows.push([items[0].catInfo.label, ...Array(numCols-1).fill('')]);
    boldRows.add(rows.length-1); mergeRows.add(rows.length-1);

    // Column headers
    rows.push(dataHeaders);
    boldRows.add(rows.length-1);

    // Data rows
    sortedItems.forEach(e => {
      if (isSteel) {
        const runData = getRunData(e.shooter.id, e.pi);
        const runCols = Array.from({length: runs}, (_,r) => {
          const rd = runData.find(d => d.r === r && d.stg === 0);
          return rd && rd.adj !== null ? parseFloat(rd.adj.toFixed(2)) : '';
        });
        rows.push([
          `${e.shooter.firstName} ${e.shooter.lastName}`,
          e.pistol.make || '',
          e.pistol.type === 'R' ? `${e.pistol.calibre}R` : e.pistol.calibre,
          e.pistol.cls,
          ...runCols,
          parseFloat(e.score.toFixed(2))
        ]);
      } else {
        const v = e.score.vals || {};
        rows.push([
          `${e.shooter.firstName} ${e.shooter.lastName}`,
          e.pistol.make || '',
          e.pistol.type === 'R' ? `${e.pistol.calibre}R` : e.pistol.calibre,
          e.pistol.cls,
          v['X']||0, v['10']||0, v['9']||0, v['8']||0, v['7']||0, v['6']||0,
          parseFloat(e.score.total.toFixed(2))
        ]);
      }
    });
  });

  const ws = XLSX.utils.aoa_to_sheet(rows);

  // Merges
  const merges = [];
  rows.forEach((row, ri) => {
    if (mergeRows.has(ri) && row[0] !== '') {
      merges.push({ s:{r:ri,c:0}, e:{r:ri,c:numCols-1} });
    }
  });
  ws['!merges'] = merges;

  // Apply bold + borders to all cells
  const range = XLSX.utils.decode_range(ws['!ref'] || 'A1');
  for (let R = range.s.r; R <= range.e.r; R++) {
    for (let C = range.s.c; C <= range.e.c; C++) {
      const addr = XLSX.utils.encode_cell({r:R, c:C});
      if (!ws[addr]) ws[addr] = {v:'', t:'s'};
      ws[addr].s = {
        font: { bold: boldRows.has(R) },
        border: {
          top:    {style:'thin', color:{rgb:'CCCCCC'}},
          bottom: {style:'thin', color:{rgb:'CCCCCC'}},
          left:   {style:'thin', color:{rgb:'CCCCCC'}},
          right:  {style:'thin', color:{rgb:'CCCCCC'}}
        }
      };
    }
  }

  // Column widths
  const runWidths = isSteel ? Array.from({length:runs}, ()=>({wch:10})) : [];
  if (isSteel) {
    ws['!cols'] = [{wch:22},{wch:18},{wch:10},{wch:6},...runWidths,{wch:14}];
  } else {
    ws['!cols'] = [{wch:22},{wch:18},{wch:10},{wch:6},{wch:5},{wch:5},{wch:5},{wch:5},{wch:5},{wch:5},{wch:10}];
  }

  XLSX.utils.book_append_sheet(wb, ws, sheetName);
}

function doExcel() {
  const wb = XLSX.utils.book_new();
  if (S.steel.on) buildScoreSheet(wb, 'steel');
  if (S.paper.on) buildScoreSheet(wb, 'paper');
  XLSX.writeFile(wb, (S.date||'results')+'-'+(S.title||'scores').replace(/\s+/g,'-')+'.xlsx');
}


let S = { title:'',date:'',steel:{on:false,name:'Steel',method:'single',stages:1,penalty:5},paper:{on:false,name:'Paper',shots:12},shooters:[],scores:{} };
let activeTab = 'rankings';
let scoreMode = 'both';
const modeKey = 'share_mode';


function buildCompToggles(mode) {
  const el = document.getElementById('comp-toggles');
  if (!el) return;
  if (!S.steel.on && !S.paper.on) { el.style.display='none'; return; }
  if (!S.steel.on || !S.paper.on) { el.style.display='none'; return; }
  el.style.display = 'flex';
  el.innerHTML = '';
  ['steel','paper'].forEach(comp => {
    const active = mode===comp || mode==='both';
    const color = comp==='steel' ? '#2a6faa' : '#2a7a45';
    const label = comp==='steel'
      ? '[T] ' + (S.steel.name||'Steel') + ' - ' + methodLabel(S.steel.method)
      : '[P] ' + (S.paper.name||'Paper') + ' - ' + S.paper.shots + ' shots';
    const btn = document.createElement('button');
    btn.textContent = label;
    btn.style.cssText = 'font-family:monospace;font-size:13px;font-weight:700;padding:5px 14px;border-radius:5px;cursor:pointer;border:2px solid '+color+';background:'+(active?color:'transparent')+';color:'+(active?'white':color)+';';
    btn.onclick = function(){ toggleMode(comp); };
    el.appendChild(btn);
  });
}

function toggleMode(comp) {
  scoreMode = scoreMode==='both' ? comp : scoreMode===comp ? 'both' : comp;
  localStorage.setItem(modeKey, scoreMode);
  buildCompToggles(scoreMode);
  renderAll();
}


function renderScoresTab(containerId) {
  const el = document.getElementById(containerId);
  if (!S.shooters.length) {
    el.innerHTML = '<div class="no-comp"><div class="icon">👤</div><h2>No shooters yet</h2></div>';
    return;
  }
  let html = '';
  S.shooters.forEach(s => {
    if (!s.pistols||!s.pistols.length) return;
    const roBadge = s.isRO ? '<span style="background:#c9861a;color:#000;padding:1px 6px;border-radius:3px;font-size:11px;font-weight:700;margin-left:6px">RO</span>' : '';
    let pistolsHtml = '';
    s.pistols.forEach((p,pi) => {
      const cat = getCatInfo(p.calibre, p.cls, p.type);
      const sc = S.scores[s.id]?.[pi] || {};
      let steelHtml='', paperHtml='';
      if (S.steel.on && (scoreMode==='steel'||scoreMode==='both')) {
        const runs = runCount();
        const steel = sc.steel||{};
        const pt = S.steel.penalty||5;
        const runCols = Array.from({length:runs},(_,r)=>{
          const raw=parseFloat(steel['s0_r'+r]);
          const miss=parseInt(steel['s0_r'+r+'_miss'])||0;
          const oos=parseInt(steel['s0_r'+r+'_oos'])||0;
          const pen=(miss+oos)*pt;
          const adj=(!isNaN(raw)&&raw>0)?raw+pen:null;
          const pb=pen>0?'<div class="pen-badge">+'+pen+'s</div>':'';
          return '<div class="run-col"><div class="zone-lbl">Run '+(r+1)+'</div><div class="run-val">'+
            (adj!==null?adj.toFixed(2):'—')+pb+'</div></div>';
        }).join('');
        const res=calcSteel(s.id,pi);
        const ml=methodLabel(S.steel.method);
        steelHtml='<div style="margin-bottom:10px"><div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#2a6faa;margin-bottom:6px">[T] '+S.steel.name+'</div>'
          +'<div class="time-row">'+runCols+'</div>'
          +(res!==null?'<div class="score-result">'+ml+': '+res.toFixed(2)+'s</div>':'')+'</div>';
      }
      if (S.paper.on && (scoreMode==='paper'||scoreMode==='both')) {
        const paper=sc.paper||{};
        const zones=['X','10','9','8','7','6'];
        const zoneHtml=zones.map(z=>{
          const v=paper['z'+z]||0;
          return '<div class="zone-col"><div class="zone-lbl'+(z==='X'?' x':'')+'">'
            +z+'</div><div class="zone-val">'+v+'</div></div>';
        }).join('');
        const res=calcPaper(s.id,pi);
        paperHtml='<div><div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#2a7a45;margin-bottom:6px">[P] '+S.paper.name+'</div>'
          +'<div class="paper-zones">'+zoneHtml+'</div>'
          +(res?'<div class="score-result" style="color:#2a7a45">'+res.display+' = '+res.total.toFixed(2)+' pts</div>':'')+'</div>';
      }
      if (!steelHtml&&!paperHtml) return;
      pistolsHtml+='<div class="pistol-entry"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
        +'<div><span style="font-weight:700;font-size:13px;font-family:'Roboto Condensed',sans-serif;text-transform:uppercase">'+(p.make||'Pistol')+'</span>'
        +' <span class="pill '+cat.cls+'">'+cat.label+'</span></div></div>'+steelHtml+paperHtml+'</div>';
    });
    if (!pistolsHtml) return;
    html+='<div class="score-card"><div class="score-card-head"><span class="score-card-name">'+s.firstName+' '+s.lastName+roBadge+'</span></div>'
      +'<div style="padding:10px 12px">'+pistolsHtml+'</div></div>';
  });
  if (!html) html='<div class="no-comp"><div class="icon">📋</div><h2>No scores yet</h2></div>';
  el.innerHTML = html;
}


function renderRankingsTab(containerId, showExport) {
  const el = document.getElementById(containerId);
  let html = '';
  if (S.steel.on && (scoreMode==='steel'||scoreMode==='both')) {
    const entries = getAllEntries('steel');
    if (entries.length) html += buildResultSection('steel', entries);
  }
  if (S.paper.on && (scoreMode==='paper'||scoreMode==='both')) {
    const entries = getAllEntries('paper');
    if (entries.length) html += buildResultSection('paper', entries);
  }
  if (!html) html = '<div class="no-comp"><div class="icon">🏆</div><h2>No scores yet</h2><p>Rankings appear as scores are entered.</p></div>';
  if (showExport) {
    html += '<div class="export-bar">'
      + '<button class="btn btn-dark" onclick="window.print()">🖨 Print / PDF</button>'
      + '<button class="btn btn-green" onclick="doExcel()">📊 Export Excel</button>'
      + '</div>';
  }
  el.innerHTML = html;
}


function showTab(tab) {
  activeTab = tab;
  ['rankings','scores'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('btn-'+t).classList.toggle('active', t===tab);
  });
  renderAll();
}

function renderAll() {
  buildCompToggles(scoreMode);
  renderRankingsTab('tab-rankings', true);
  renderScoresTab('tab-scores');
}
